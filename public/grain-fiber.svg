<svg xmlns="http://www.w3.org/2000/svg" width="384" height="384" viewBox="0 0 384 384">
  <filter id="fiber" x="0%" y="0%" width="100%" height="100%" color-interpolation-filters="sRGB">
    <feTurbulence type="fractalNoise" baseFrequency="0.35" numOctaves="3" stitchTiles="stitch" result="noise" />
    <feColorMatrix in="noise" type="saturate" values="0" result="gray" />
    <feGaussianBlur in="gray" stdDeviation="0.6" result="soft" />
  </filter>
  <rect width="384" height="384" filter="url(#fiber)" opacity="0.28" />
</svg>
