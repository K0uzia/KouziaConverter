<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256">
  <filter id="grain" x="0%" y="0%" width="100%" height="100%" color-interpolation-filters="sRGB">
    <feTurbulence type="fractalNoise" baseFrequency="1.05" numOctaves="5" stitchTiles="stitch" result="noise" />
    <feColorMatrix in="noise" type="saturate" values="0" result="gray" />
    <feComponentTransfer in="gray" result="grain">
      <feFuncA type="gamma" amplitude="1" exponent="1.35" offset="0" />
    </feComponentTransfer>
  </filter>
  <rect width="256" height="256" filter="url(#grain)" opacity="0.55" />
</svg>
